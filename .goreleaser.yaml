version: 2

project_name: skill-craft

before:
  hooks:
    - go mod tidy

builds:
  - id: skill-craft
    main: ./cmd/skill-craft
    binary: skill-craft
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

universal_binaries:
  - replace: true

archives:
  - formats: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip

brews:
  - name: skill-craft
    repository:
      owner: Angel-Sechar
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Angel-Sechar/skill-craft"
    description: "Senior-level development skills for AI coding agents."
    license: MIT
    skip_upload: "auto"
    install: |
      bin.install "skill-craft"
    test: |
      system "#{bin}/skill-craft", "--version"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
